<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | AntechLearn</title>
  <link rel="stylesheet" href="./styles/otp_verify.css">
  <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
</head>
<body>

  <div class="container">
    <div class="wrapper">

      <!-- Brand -->
      <div class="brand">
        <span class="brand-icon">🔐</span>
        <h1 class="brand-name">AntechLearn</h1>
      </div>

      <h2 class="form-title">Enter Your OTP</h2>
      <p class="form-subtitle">
        A 6-digit code was sent to your email address.<br>
        Please enter it below to continue.
      </p>

      <!-- Message display -->
      <p class="message js-otp-message" id="otp-message"></p>

      <!-- OTP digit boxes -->
      <div class="otp-inputs js-otp-inputs-form" id="otp-inputs">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="OTP digit 1">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="OTP digit 2">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="OTP digit 3">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="OTP digit 4">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="OTP digit 5">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="OTP digit 6">
      </div>

      <!-- Timer -->
      <p class="timer-text">
        Code expires in: <span class="js-countdown js-otp-timer" id="otp-timer">15:00</span>
      </p>

      <!-- Submit -->
      <button class="submit_button js-verify-otp-btn" id="verify-otp-btn">Verify OTP</button>

      <!-- Resend -->
      <p class="resend-text">
        Didn't receive the code?
        <br>
        <button class="resend-btn js-resend-otp" id="resend-otp">Resend OTP</button>
        <br>
        </p>
        <p class="js-resend-countdown" style="display:none;">
    Resend new token in <strong class="js-resend-countdown-timer">00:60</strong></p>
      </p>

      <!-- Back link -->
      <p class="back-link">
        <a href="./login.html">&larr; Back to Login</a>
      </p>

    </div>
  </div>

  <script type="module" src="./scripts/auth/otpVerify.js"></script>

</body>
</html>
