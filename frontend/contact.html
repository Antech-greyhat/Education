<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AntechLearn</title>
    <link rel="stylesheet" href="styles/edu.css">
    <link rel="stylesheet" href="styles/contact.css">
    <link rel="stylesheet" href="notifications.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍💻</text></svg>">
</head>
<body>
    <!-- Header with Navigation -->
    <header class="header js-header-display">
      <!-- EJECTED BY JAVASCRIPT -->
      
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <h1 class="section-title">Get In Touch</h1>
            <p class="section-subtitle">Have questions or feedback? We'd love to hear from you!</p>
            
            <div class="contact-container">
                <div class="contact-info">
                    <h2>Contact Information</h2>
                    <p>Feel free to reach out to us through any of these channels:</p>
                    
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h3>Email</h3>
                            <a href="mailto:antechcypherx@gmail.com">Email Us</a>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h3>Phone</h3>
                            <a href="tel:+245714452396">Reach Us Out</a>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h3>Location</h3>
                            <p>Machakos, Kenya<br>P.O Box 17-Miu Machakos</p>
                        </div>
                    </div>
                    
                    <div class="contact-social">
                        <h3>Follow Us</h3>
                        <div class="social-links-contact">
                            <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                            <a href="https://github.com/Antech-greyhat" aria-label="GitHub" target="_blank"><i class="fab fa-github"></i></a>
                            <a href="#" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                        </div>
                    </div>
                </div>
                
                <div class="contact-form-container">
                    <h2>Send Us a Message</h2>
                    
                  <!-- USED DIV TO AVOID PAGE RELOAD -->
                    <div id="contactForm" class="contact-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" name="firstName" required class="js-first-name">
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" name="lastName" required class="js-last-name">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required class="js-email">
                        </div>
                        
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required class="js-subject">
                        </div>
                        
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" required class="js-message"></textarea>
                        </div>
                      <p class="js-feedback-display">
                        <!-- FOR DISPLAYING MESSAGES -->
                      </p>
                        <button type="button" class="btn btn-primary btn-full js-contact-button">
                            <i class="fas fa-paper-plane"></i> Send Message
                        </button>
                    </div>
                    
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer js-footer-information">
      <!-- EJECTED BY JAVASCRIPT -->
      
    </footer>

  <script src="scripts/edu.js"></script>
    
  <!-- DONT REMOVE THIS SCRIPT ITS RESPONSIBLE FOR THE FOOTER CONTENTS -->
  <script src="scripts/footer.js"></script>
  
  <script type="module" src="scripts/newsletter.js"></script>
  
  <script type="module" src="scripts/header.js"></script>
  
  <script type="module" src="scripts/auth/contactUs.js"></script>
  
  <script type="module" src="scripts/apiCheck.js"></script>
  
</body>
</html>
