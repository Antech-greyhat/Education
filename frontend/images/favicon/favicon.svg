<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="url(#grad)" />
  
  <!-- Code bracket symbolizing programming -->
  <text x="22" y="70" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" opacity="0.2">&lt;</text>
  <text x="52" y="70" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" opacity="0.2">/&gt;</text>
  
  <!-- Main "A" letter for Antech -->
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="white">A</text>
  
  <!-- Small dot for Learn -->
  <circle cx="70" cy="40" r="8" fill="white" opacity="0.9">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>