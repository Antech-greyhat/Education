<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AntechLearn</title>
    <link rel="stylesheet" href="styles/edu.css">
    <link rel="stylesheet" href="styles/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍💻</text></svg>">
</head>
<body>
    <!-- Header with Navigation -->
    <header class="header js-header-display">
      <!-- EJECTED BY JAVASCRIPT -->
    </header>

    <!-- Registration Form Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-form-container">
                    <div class="auth-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2>Create Your Account</h2>
                    <p class="auth-subtitle">Fill in your details to get started</p>
                    
                    <!-- CHANGED GROM FORM TAG TO DIV TO PREVENT PAGE RELOAD -->
                    <div id="registerForm" class="auth-form">
                        <div class="form-group">
                            <label for="registerName"><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="registerName" name="fullname" placeholder="Antech Learn" required
                            class="js-full-name">
                        </div>
                        
                        <div class="form-group">
                            <label for="registerEmail"><i class="fas fa-envelope"></i> Email Address</label>
                            <input type="email" id="registerEmail" name="email" placeholder="your.email@example.com" required
                            class="js-email">
                        </div>
                        
                        <div class="form-group">
                            <label for="registerPassword"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="registerPassword" name="password" placeholder="Create a strong password" required
                            class="js-password1">
                            <small class="form-hint">Must be at least 8 characters long</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="registerConfirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                            <input type="password" id="registerConfirmPassword" name="confirmPassword" placeholder="Re-enter your password" required class="js-password2">
                        </div>
                        
                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="agreeTerms" required class="js-terms-conditions">
                                <span>I agree to the <a href="#" class="link-text">Terms of Service</a> and <a href="#" class="link-text">Privacy Policy</a></span>
                            </label>
                        </div>
                  <!-- FOR DISLAYING MESSAGES -->
                  <p class="js-register-message"></p>
                        <button type="button" class="btn btn-primary btn-full js-register-button">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                    </div>
                    
                    <div class="auth-divider">
                        <span>OR</span>
                    </div>
                    
                    <!-- FOR NOW LET THEM BE DISSABLED -->
                    <div class="social-login">
                        <button class="btn-social btn-google" disabled>
                            <i class="fab fa-google"></i> Sign up with Google
                        </button>
                        <button class="btn-social btn-github" disabled>
                            <i class="fab fa-github"></i> Sign up with GitHub
                        </button>
                    </div>
                    
                    <p class="auth-footer">
                        Already have an account? <a href="login.html" class="link-primary">Log in here</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; <span id="currentYear"></span> AntechLearn. All rights reserved. Made with <i class="fas fa-heart"></i> for aspiring developers.</p>
            </div>
        </div>
    </footer>

    <script src="scripts/edu.js"></script>

    <script type="module" src="scripts/auth/register.js"></script>
    
     <script type="module" src="scripts/header.js"></script>
     
</body>
</html>
