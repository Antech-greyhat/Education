<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AntechLearn</title>

    <link rel="stylesheet" href="../styles/edu.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
</head>

<body>

<header class="header">
    <div class="container">
        <nav class="navbar">
            <a href="../index.html" class="logo">
                <i class="fas fa-code"></i>
                <span>AntechLearn</span>
            </a>

            <ul class="nav-menu">
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="../languages.html" class="nav-link">Languages</a></li>
                <li class="nav-item"><a href="../guide.html" class="nav-link">Guide</a></li>
                <li class="nav-item"><a href="../about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="../contact.html" class="nav-link">Contact</a></li>
            </ul>

            <div class="nav-controls">
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="../login.html" class="btn btn-secondary nav-btn">User Login</a>
                <div class="hamburger" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </div>
</header>

<section class="auth-section">
    <div class="container">
        <div class="auth-container">
            <div class="auth-form-container">

                <div class="auth-icon">
                    <i class="fas fa-user-shield"></i>
                </div>

                <h2>Admin Login</h2>
                <p class="auth-subtitle">Access the administrative dashboard</p>

                <div id="adminLoginForm" class="auth-form">

                    <div class="form-group">
                        <label>
                            <i class="fas fa-envelope"></i> Admin Email
                        </label>
                        <input 
                            class="js-email-input"
                            type="email"
                            id="adminEmail"
                            placeholder="admin@antechlearn.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input-wrapper">
                            <i class="fas fa-lock password-icon"></i>
                            <input 
                                class="js-password-input"
                                type="password"
                                id="adminPassword"
                                placeholder="Enter your admin password"
                                required
                            >
                            <button type="button" class="toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <p class="js-message-display"></p>

                    <button type="button" class="btn btn-primary btn-full js-submit-button">
                        <i class="fas fa-sign-in-alt"></i> Admin Login
                    </button>

                </div>

            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 AntechLearn. All rights reserved.</p>
    </div>
</footer>

<script src="../scripts/edu.js"></script>
<script type="module" src="../scripts/auth/adminLogin.js"></script>

</body>
</html>
