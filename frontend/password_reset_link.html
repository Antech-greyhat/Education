<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AntechLearn</title>
  <link rel="stylesheet" href="./styles/password_reset_link.css">
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <h1 class="login_reg_header">Reset Password</h1>
      <div class="message">
        
      </div>

      <!-- Email input -->
      <div class="input_section floating js-email-submit">
        <input class="input js-reset-email" type="email" id="reset-email" placeholder=" " required>
        <label for="reset-email">Enter your email</label>
      </div>

      <button class="submit_button js-reset-button" id="send-reset-link">Send Reset Link</button>
      <p class="message js-message-display" id="reset-msg "></p>

      <!-- New password section (shown only if token exists) -->
      
      <div class="js-new-pass-section" id="new-pass-section" style="display:none; margin-top:1.5rem;">
        <div class="input_section floating">
          <input class="input js-new-password" type="password" id="new-pass" placeholder=" " required>
          <label for="new-pass">New Password</label>
        </div>
        <button class="submit_button js-new-pass-submit" id="reset-submit">Reset Password</button>
        <p class="message js-message-display" id="reset-result"></p>
      </div>

    </div>
  </div>

  <script type="module" src="./scripts/auth/resetPassword.js"></script>
  
  <script type="module" src="./scripts/keepAlive.js"></script>
  
</body>
</html>
