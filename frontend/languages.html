<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programming Languages - AntechLearn</title>
  <link rel="stylesheet" href="styles/edu.css">
  <link rel="stylesheet" href="./styles/admin-auth.css">
  <link rel="stylesheet" href="styles/languages.css">
  <link rel="stylesheet" href="styles/spinner.css">
  <link rel="stylesheet" href="notifications.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
</head>
<body>
  <!-- Spinner Container -->
  <div id="spinner-container">
    <div class="admin-spinner">
      <div class="logo">
        <i class="fas fa-code"></i>
      </div>
      <div class="bouncing-balls">
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
      </div>
      <div class="text">AntechLearn</div>
      <div class="subtext">Loading languages...</div>
    </div>
  </div>

  <!-- Page Content -->
  <div id="page-content" style="display: none;">
    <header class="header js-header-display"></header>

    <!-- Message display div -->
    <div class="js-courses-message courses-message" style="display: none;"></div>

    <section class="courses-page">
      <div class="container">
        <section class="search-section">
          <h2 class="section-title">Find Your Programming Language</h2>
          <div class="search-bar">
            <input type="text" id="mainSearch" placeholder="Search for HTML, CSS, JavaScript, Python...">
            <button id="mainSearchBtn" class="search-btn">
              <i class="fas fa-search"></i> Search
            </button>
          </div>
          <div class="search-tags">
            <span class="search-tag" data-search="html">HTML</span>
            <span class="search-tag" data-search="css">CSS</span>
            <span class="search-tag" data-search="javascript">JavaScript</span>
            <span class="search-tag" data-search="python">Python</span>
            <span class="search-tag" data-search="web development">Web Development</span>
            <span class="search-tag" data-search="beginner">Beginner Friendly</span>
          </div>
        </section>

        <section class="languages-section" id="languages">
          <h2 class="section-title">Popular Programming Languages</h2>
          <p class="section-subtitle">Choose a language to start your learning journey</p>
          
          <div class="languages-grid" id="languages-grid">
            <!-- JS will populate this -->
          </div>
        </section>
      </div>
    </section>

    <footer class="footer js-footer-information">
      
      <!-- Loaded by JS -->
      
    </footer>
  </div>

  <script src="scripts/footer.js"></script>
  <script type="module" src="scripts/header.js"></script>

  <script type="module" src="scripts/newsletter.js"></script>
  
  
  <script type="module" src="scripts/apiCheck.js"></script>
  
  <script type="module" src="scripts/courses/loadCourseContent.js"></script>
  
</body>
</html>
