<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programming Languages - AntechLearn</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/spinner.css">
  <link rel="stylesheet" href="styles/languages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
</head>
<body>

  <!-- Spinner -->
  <div id="spinner-container">
    <div class="admin-spinner">
      <div class="logo">
        <i class="fas fa-code"></i>
      </div>
      <div class="bouncing-balls">
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
      </div>
      <div class="text">AntechLearn</div>
      <div class="subtext">Loading languages...</div>
    </div>
  </div>

  <!-- Page content -->
  <div id="page-content" style="display:none;">

    <header class="header js-header-display"></header>

    <div class="js-courses-message courses-message" style="display:none;"></div>

    <section class="courses-page">
      <div class="container">

        <!-- Search -->
        <section class="search-section">
          <div class="search-section__header reveal">
            <span class="section-tag">Browse Courses</span>
            <h2 class="section-title">Find Your Programming Language</h2>
            <p class="section-subtitle">Search by language, tutor, or topic — then start learning.</p>
          </div>

          <div class="search-bar reveal reveal-delay-1">
            <i class="fas fa-search search-bar__icon"></i>
            <input
              type="text"
              id="mainSearch"
              placeholder="Search for HTML, CSS, JavaScript, Python...">
            <button id="mainSearchBtn" class="search-btn">
              Search
            </button>
          </div>
        </section>

        <!-- Filter buttons — JS populates this -->
        <div class="filter-bar reveal reveal-delay-2" id="filterContainer"></div>

        <!-- Languages grid -->
        <section class="languages-section" id="languages">
          <div class="languages-section__header reveal">
            <h2 class="section-title">Popular Programming Languages</h2>
            <p class="section-subtitle">Choose a language to start your learning journey</p>
          </div>
          <div class="languages-grid" id="languages-grid"></div>
        </section>

      </div>
    </section>

    <footer class="footer js-footer-information"></footer>

  </div>

  <script src="scripts/footer.js"></script>
  <script src="scripts/edu.js"></script>
  <script type="module" src="scripts/header.js"></script>
  <script type="module" src="scripts/newsletter.js"></script>
  <script type="module" src="scripts/apiCheck.js"></script>
  <script type="module" src="scripts/courses/loadCourseContent.js"></script>
  
  <!-- console -->
  <!--
  <script src="https://unpkg.com/vconsole/dist/vconsole.min.js"></script>
  <script>
    const vConsole = new VConsole();
  </script>-->

</body>
</html>
