<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - AntechLearn</title>
    <link rel="stylesheet" href="styles/edu.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍💻</text></svg>">
    <style>
        /* Password Input Wrapper Styles */
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input-wrapper .password-icon {
            position: absolute;
            left: 1rem;
            color: var(--primary-color);
            pointer-events: none;
            z-index: 1;
        }

        .dark-theme .password-input-wrapper .password-icon {
            color: var(--accent-color);
        }

        .password-input-wrapper input {
            padding-left: 2.8rem !important;
            padding-right: 3rem !important;
        }

        .password-input-wrapper .toggle-password {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-color);
            font-size: 1.1rem;
            padding: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition-fast);
        }

        .password-input-wrapper .toggle-password:hover {
            color: var(--primary-color);
        }

        .dark-theme .password-input-wrapper .toggle-password:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <!-- Header with Navigation -->
    <header class="header js-header-display">
      <!-- EJECTED BY JAVASCRIPT -->
      
    </header>

    <!-- Login Form Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-form-container">
                    <div class="auth-icon">
                        <i class="fas fa-laptop-code"></i>
                    </div>
                    <h2>Log In to Your Account</h2>
                    <p class="auth-subtitle">Enter your credentials to access your dashboard</p>
                    
                    <!-- USED DIV INSTED OF FORM TO PREVENT PAGE RELOAD -->
                    <div id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="loginEmail"><i class="fas fa-envelope"></i> Email Address</label>
                            <input type="email" id="loginEmail" name="email" placeholder="your.email@example.com" required class="js-email">
                        </div>
                        
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <div class="password-input-wrapper">
                                <i class="fas fa-lock password-icon"></i>
                                <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required class="js-password">
                                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="rememberMe">
                                <span>Remember me</span>
                            </label>
                            <a href="password_reset_link.html" class="link-text">Forgot password?</a>
                        </div>
                        
                        <p class="js-login-message">
                         <!-- for mesage feedback -->  
                        </p>
                        
                        <button type="submit" class="btn btn-primary btn-full js-submit-button">
                            <i class="fas fa-sign-in-alt"></i> Log In
                        </button>
                    </div>
                    
                    <div class="auth-divider">
                        <span>OR</span>
                    </div>
                    
                    <!-- DISSABLED FOR NOW  -->
                    
                    <div class="social-login">
                        <button class="btn-social btn-google">
                            <i class="fab fa-google"></i> Continue with Google
                        </button>
                        <button class="btn-social btn-github">
                            <i class="fab fa-github"></i> Continue with GitHub
                        </button>
                    </div>
                    
                    <p class="auth-footer">
                        Don't have an account? <a href="register.html" class="link-primary">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; <span id="currentYear"></span> AntechLearn. All rights reserved. Made with <i class="fas fa-heart"></i> for aspiring developers.</p>
            </div>
        </div>
    </footer>

    <script src="scripts/edu.js"></script>
    
    <script>
        // Password Toggle Functionality for User Login
        const togglePasswordBtn = document.querySelector('.toggle-password');
        const passwordInput = document.getElementById('loginPassword');
        const lockIcon = document.querySelector('.password-icon');

        if (togglePasswordBtn && passwordInput && lockIcon) {
            // Function to toggle password visibility
            function togglePasswordVisibility() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                const eyeIcon = togglePasswordBtn.querySelector('i');
                eyeIcon.classList.toggle('fa-eye');
                eyeIcon.classList.toggle('fa-eye-slash');
                
                // Toggle lock icon state
                lockIcon.classList.toggle('fa-lock');
                lockIcon.classList.toggle('fa-lock-open');
            }

            // Add click event to eye icon button
            togglePasswordBtn.addEventListener('click', togglePasswordVisibility);

            // Add click event to lock icon (make it clickable)
            lockIcon.addEventListener('click', togglePasswordVisibility);
            lockIcon.style.cursor = 'pointer';
            lockIcon.style.pointerEvents = 'auto';
        }

        // Remember Me Functionality
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const emailInput = document.getElementById('loginEmail');

        // Load saved email on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('userRememberEmail');
            const rememberMe = localStorage.getItem('userRememberMe') === 'true';
            
            if (rememberMe && savedEmail && emailInput) {
                emailInput.value = savedEmail;
                rememberMeCheckbox.checked = true;
            }
        });

        // Save remember me preference on form submit
        document.querySelector('.js-submit-button').addEventListener('click', () => {
            if (rememberMeCheckbox.checked) {
                localStorage.setItem('userRememberMe', 'true');
                localStorage.setItem('userRememberEmail', emailInput.value);
            } else {
                localStorage.removeItem('userRememberMe');
                localStorage.removeItem('userRememberEmail');
            }
        });
    </script>
    
    <script type="module" src="scripts/auth/login.js"></script>
    
    <script type="module" src="scripts/header.js"></script>
    
</body>
</html>
