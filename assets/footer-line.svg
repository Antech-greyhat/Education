<svg width="400" height="30" viewBox="0 0 400 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0FA87E;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0FA87E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="14" width="400" height="1.5" fill="url(#fl)"/>
  <circle cx="200" cy="14" r="3" fill="#0FA87E">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
