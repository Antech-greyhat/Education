<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C8F6A"/>
      <stop offset="100%" style="stop-color:#0FA87E"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0FA87E"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner dashed ring -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="url(#g2)" stroke-width="1" stroke-dasharray="7 4" opacity="0.45">
    <animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Background glow -->
  <circle cx="60" cy="60" r="34" fill="url(#g1)" opacity="0.08"/>

  <!-- Code icon -->
  <text x="60" y="68" dominant-baseline="middle" text-anchor="middle"
        font-family="monospace" font-size="26" font-weight="700" fill="url(#g1)">&lt;/&gt;</text>

  <!-- Pulse dot -->
  <circle cx="60" cy="100" r="3" fill="#0FA87E">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
